apiVersion: v1
kind: Service
metadata:  # metadata는 Object 별로 다 있음
  namespace: k8s-khw-np-01
  name: hello-kube-01-svc
  labels:
    part-of: k8s-khw-project-01
    component: backend
    name: hello-kube
    instance: hello-kube-01
    version: "1.0"
    managed-by: manual
spec:  # 연결 정보 속성
  selector:
    part-of: k8s-khw-project-01
    component: backend
    name: hello-kube
    instance: hello-kube-01
  ports:
    - port: 80
      targetPort: http
      # nodePort: 31231   type이 NodePort일 때 사용
  type: ClusterIP  # Ingress 사용할거기 때문에 NodePort -> ClusterIP로 변경