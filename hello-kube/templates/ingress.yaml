{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-kube-01-ingress
  namespace: k8s-khw-ns-01
  labels: # deployment label 그대로 가져옴
    {{- toYaml .Values.commonLabels | indent 4 }}
spec:
  ingressClassName: nginx
  rules:
  {{- range .Values.ingress.hosts }}
    - host: {{ .host }}  # hello-kube 로 이름만듬
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hello-kube-01-svc  # 내 Service 이름 지정
                port:
                  number: 80              
  {{- end }}
{{- end }}