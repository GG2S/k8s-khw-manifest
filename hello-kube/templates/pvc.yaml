apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  namespace: k8s-khw-ns-01
  name: hello-kube-01-files
  labels:
    {{- toYaml .Values.commonLabels . | indent 4 }}
spec:
  accessModes:
    - ReadWriteOnce  # 읽기, 쓰기 모드 지정
  storageClassName: longhorn  # storageClassName: 이라는 옵션을 추가해줌
  resources:
    requests:
      storage: 2Gi  # 저장 공간 용량 요청 수치